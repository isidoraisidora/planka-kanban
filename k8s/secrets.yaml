apiVersion: v1
kind: Secret
metadata:
  name: planka-secrets
  namespace: planka-system
type: Opaque
data:
  # These are base64 encoded
  # "notsecretkey" in base64 is bm90c2VjcmV0a2V5
  SECRET_KEY: bm90c2VjcmV0a2V5
  # "password123" in base64 is cGFzc3dvcmQxMjM=
  POSTGRES_PASSWORD: cGFzc3dvcmQxMjM=