apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: planka-ingress
  namespace: planka-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: planka.local  # Change to your domain or use localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: planka-service
                port:
                  number: 1337