name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}

jobs:
  validate:
    name: CI - Validate Docker Setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml syntax
        run: docker compose config

      - name: List all services
        run: |
          echo "Services in docker-compose.yml:"
          docker compose config --services

      - name: Verify Planka image is accessible
        run: |
          echo "Testing pull of Planka image..."
          docker pull ghcr.io/plankanban/planka:latest
          echo "Image pull successful"

  push-to-docker-hub:
    name: CD - Push to Docker Hub
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Push Planka image to Docker Hub
        run: |
          docker pull ghcr.io/plankanban/planka:latest
          docker tag ghcr.io/plankanban/planka:latest ${{ secrets.DOCKER_HUB_USERNAME }}/planka:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/planka:latest
          echo "Image pushed: ${{ secrets.DOCKER_HUB_USERNAME }}/planka:latest"

  deploy-to-k8s:
    name: CD - Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: push-to-docker-hub
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Deploy to Kubernetes
        run: |
          # Apply namespace first
          kubectl apply -f k8s/namespace.yaml
          # Apply all manifests
          kubectl apply -f k8s/

      - name: Restart deployment to pull latest image
        run: |
          # Force restart to pull the latest image
          kubectl rollout restart deployment/planka-deployment -n planka-system

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/planka-deployment -n planka-system --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n planka-system
          kubectl get svc -n planka-system
          kubectl get ingress -n planka-system